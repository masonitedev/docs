site_name: Masonite Documentation
docs_dir: .
site_url: https://docs.masonite.dev
site_description: Documentation for the Masonite Python web framework
repo_url: https://github.com/masonitedev/masonite
repo_name: masonitedev/masonite
edit_uri: https://github.com/masonitedev/docs/edit/v5.0/

theme:
  name: material
  logo: assets/logo/masonite-mark.svg
  favicon: assets/logo/masonite-mark.svg
  font:
    text: Sora
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - same-dir
  - redirects:
      redirect_maps:
        # features/ was reorganized into Laravel-style sections in the
        # 5.x documentation overhaul. Keep the old URLs working.
        "features/configuration.md": "getting-started/configuration.md"
        "features/environments.md": "getting-started/environments.md"
        "prologue/create-a-blog.md": "getting-started/create-a-blog.md"
        "features/facades.md": "architecture/facades.md"
        "features/routing.md": "the-basics/routing.md"
        "features/middleware.md": "the-basics/middleware.md"
        "features/csrf.md": "the-basics/csrf.md"
        "features/controllers.md": "the-basics/controllers.md"
        "features/request.md": "the-basics/request.md"
        "features/response.md": "the-basics/response.md"
        "features/views.md": "the-basics/views.md"
        "features/static-files.md": "the-basics/static-files.md"
        "features/compiling-assets.md": "the-basics/compiling-assets.md"
        "features/sessions.md": "the-basics/sessions.md"
        "features/validation.md": "the-basics/validation.md"
        "features/error-handling.md": "the-basics/error-handling.md"
        "features/logging.md": "the-basics/logging.md"
        "features/authentication.md": "security/authentication.md"
        "features/authorization.md": "security/authorization.md"
        "features/cors.md": "security/cors.md"
        "features/hashing.md": "security/hashing.md"
        "features/api.md": "digging-deeper/api.md"
        "features/broadcasting.md": "digging-deeper/broadcasting.md"
        "features/cache.md": "digging-deeper/cache.md"
        "features/commands.md": "digging-deeper/commands.md"
        "features/events.md": "digging-deeper/events.md"
        "features/hashid.md": "digging-deeper/hashid.md"
        "features/helpers.md": "digging-deeper/helpers.md"
        "features/mail.md": "digging-deeper/mail.md"
        "features/notifications.md": "digging-deeper/notifications.md"
        "features/package-development.md": "digging-deeper/package-development.md"
        "features/queues.md": "digging-deeper/queues.md"
        "features/rates.md": "digging-deeper/rate-limiting.md"
        "features/scheduling.md": "digging-deeper/scheduling.md"
        "features/tinker.md": "digging-deeper/tinker.md"
        "features/uploading.md": "digging-deeper/filesystem.md"
        "sponsors.md": "prologue/sponsors.md"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/masonitedev
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/masonite-framework/

