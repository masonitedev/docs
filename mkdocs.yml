site_name: Masonite Documentation
docs_dir: .
site_url: https://docs.masonite.dev
site_description: Documentation for the Masonite Python web framework
repo_url: https://github.com/masonitedev/masonite
repo_name: masonitedev/masonite
edit_uri: https://github.com/masonitedev/docs/edit/v5.0/

theme:
  name: material
  logo: assets/logo/masonite-mark.svg
  favicon: assets/logo/masonite-mark.svg
  font:
    text: Sora
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - same-dir

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/masonitedev
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/masonite-framework/

